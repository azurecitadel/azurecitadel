{{/* Output shortcode for displaying expected command output with dark background */}}
{{ $label := .Get 0 | default "Example output:" }}
{{ if eq $label "-" }}
  {{ $label = "" }}
{{ end }}

<div class="output-block">
{{ if ne $label "" }}
<div class="output-label">{{ .Page.RenderString $label }}</div>
{{ end }}
<div class="output-content">{{ .Page.RenderString .Inner }}</div>
</div>
